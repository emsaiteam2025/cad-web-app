<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程手繪圖轉 CAD 系統 (線上編輯版)</title>
    <!-- 引入 Fabric.js 以支援線上拖曳編輯 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; justify-content: center; flex-wrap: wrap; }
        button { padding: 10px 15px; border: none; border-radius: 4px; background: #007bff; color: white; cursor: pointer; font-size: 14px; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        button.active { background: #28a745; }
        button.danger { background: #dc3545; }
        button.danger:hover { background: #c82333; }
        #canvas-container { border: 2px dashed #ccc; background: #fafafa; display: flex; justify-content: center; position: relative; }
        .status { text-align: center; margin-top: 10px; color: #666; font-size: 14px; }
        .instructions { background: #e9ecef; padding: 10px; border-radius: 4px; font-size: 14px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>📐 現場工程手繪圖轉 CAD <span style="font-size: 16px; color: #fff; background: #dc3545; padding: 4px 10px; border-radius: 12px; vertical-align: middle;">v1.0.25 優化部署啟動速度</span></h1>
    
    <div class="instructions">
        <strong>操作說明：</strong> 
        請先在下方輸入您的 Google Gemini API 金鑰，上傳圖片後，AI 視覺引擎會自動為您畫出管線與接頭。
        您可以**直接在畫布上拖曳、調整大小**，或按 <kbd>Delete</kbd> / <kbd>Backspace</kbd> 刪除選取的元件。
    </div>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <input type="password" id="apiKeyInput" placeholder="請在此貼上您的 Google Gemini API Key" style="padding: 10px; width: 350px; border-radius: 4px; border: 1px solid #ccc;">
        <button onclick="saveApiKey()" style="background: #28a745;">儲存金鑰</button>
    </div>

    <div class="toolbar">
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button onclick="document.getElementById('imageInput').click()">上傳手繪草圖 (自動運算)</button>
        <button class="tool-btn" data-tool="meter">水量計</button>
        <button class="tool-btn" data-tool="valve">彈性座封閘閥</button>
        <button class="tool-btn" data-tool="sleeve">套管</button>
        <button class="tool-btn" data-tool="short_a">短甲</button>
        <button class="tool-btn" data-tool="short_b">短乙</button>
        
        <!-- 大小頭下拉選單 -->
        <div style="position: relative; display: inline-block;">
            <button class="dropdown-btn" style="padding: 10px 15px; border: none; border-radius: 4px; background: #007bff; color: white; cursor: pointer; font-size: 14px;" onclick="toggleDropdown('reducerMenu')">大小頭 ▼</button>
            <div id="reducerMenu" class="dropdown-content" style="display: none; position: absolute; background-color: #f9f9f9; min-width: 140px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 100; border-radius: 4px; top: 100%; left: 0;">
                <a href="#" class="sub-tool-btn" data-tool="reducer_1" style="color: black; padding: 10px 12px; text-decoration: none; display: flex; align-items: center; border-bottom: 1px solid #ddd; font-size: 14px;">
                    <svg viewBox="0 0 40 30" width="24" height="20" style="margin-right: 8px;"><polygon points="5,5 35,10 35,20 5,25" fill="none" stroke="currentColor" stroke-width="2"/><line x1="5" y1="5" x2="5" y2="25" stroke="currentColor" stroke-width="2"/><line x1="35" y1="10" x2="35" y2="20" stroke="currentColor" stroke-width="2"/></svg> 雙法蘭
                </a>
                <a href="#" class="sub-tool-btn" data-tool="reducer_2" style="color: black; padding: 10px 12px; text-decoration: none; display: flex; align-items: center; border-bottom: 1px solid #ddd; font-size: 14px;">
                    <svg viewBox="0 0 40 30" width="24" height="20" style="margin-right: 8px;"><polyline points="5,5 5,10 10,15 5,20 5,25" fill="none" stroke="currentColor" stroke-width="2"/><line x1="5" y1="5" x2="35" y2="10" stroke="currentColor" stroke-width="2"/><line x1="5" y1="25" x2="35" y2="20" stroke="currentColor" stroke-width="2"/></svg> 承口平
                </a>
                <a href="#" class="sub-tool-btn" data-tool="reducer_3" style="color: black; padding: 10px 12px; text-decoration: none; display: flex; align-items: center; font-size: 14px;">
                    <svg viewBox="0 0 40 30" width="24" height="20" style="margin-right: 8px;"><polyline points="5,5 5,10 10,15 5,20 5,25" fill="none" stroke="currentColor" stroke-width="2"/><line x1="5" y1="5" x2="32" y2="10" stroke="currentColor" stroke-width="2"/><line x1="5" y1="25" x2="32" y2="20" stroke="currentColor" stroke-width="2"/><polyline points="32,10 28,15 36,15 32,20" fill="none" stroke="currentColor" stroke-width="2"/></svg> 承口截斷
                </a>
            </div>
        </div>

        <!-- 丁字管下拉選單 -->
        <div style="position: relative; display: inline-block;">
            <button class="dropdown-btn" style="padding: 10px 15px; border: none; border-radius: 4px; background: #007bff; color: white; cursor: pointer; font-size: 14px;" onclick="toggleDropdown('teeMenu')">丁字管 ▼</button>
            <div id="teeMenu" class="dropdown-content" style="display: none; position: absolute; background-color: #f9f9f9; min-width: 140px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 100; border-radius: 4px; top: 100%; left: 0;">
                <a href="#" class="sub-tool-btn" data-tool="tee_1" style="color: black; padding: 10px 12px; text-decoration: none; display: flex; align-items: center; border-bottom: 1px solid #ddd; font-size: 14px;">
                    <svg viewBox="0 0 40 30" width="24" height="20" style="margin-right: 8px;"><path d="M 5 20 L 35 20 M 20 20 L 20 5 M 5 15 L 5 25 M 35 15 L 35 25 M 15 5 L 25 5" stroke="currentColor" stroke-width="2" fill="none"/></svg> 雙法蘭
                </a>
                <a href="#" class="sub-tool-btn" data-tool="tee_2" style="color: black; padding: 10px 12px; text-decoration: none; display: flex; align-items: center; border-bottom: 1px solid #ddd; font-size: 14px;">
                    <svg viewBox="0 0 40 30" width="24" height="20" style="margin-right: 8px;"><path d="M 10 20 L 35 20 M 20 20 L 20 5 M 5 15 L 10 15 L 10 25 L 5 25 M 15 5 L 25 5" stroke="currentColor" stroke-width="2" fill="none"/></svg> 單承口
                </a>
                <a href="#" class="sub-tool-btn" data-tool="tee_3" style="color: black; padding: 10px 12px; text-decoration: none; display: flex; align-items: center; font-size: 14px;">
                    <svg viewBox="0 0 40 30" width="24" height="20" style="margin-right: 8px;"><path d="M 10 20 L 35 20 M 20 20 L 20 10 M 5 15 L 10 15 L 10 25 L 5 25 M 15 5 L 15 10 L 25 10 L 25 5" stroke="currentColor" stroke-width="2" fill="none"/></svg> 雙承口
                </a>
            </div>
        </div>

        <!-- 90°彎頭下拉選單 -->
        <div style="position: relative; display: inline-block;">
            <button class="dropdown-btn" style="padding: 10px 15px; border: none; border-radius: 4px; background: #007bff; color: white; cursor: pointer; font-size: 14px;" onclick="toggleDropdown('elbow90Menu')">90°彎頭 ▼</button>
            <div id="elbow90Menu" class="dropdown-content" style="display: none; position: absolute; background-color: #f9f9f9; min-width: 140px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 100; border-radius: 4px; top: 100%; left: 0;">
                <a href="#" class="sub-tool-btn" data-tool="elbow90_3" style="color: black; padding: 10px 12px; text-decoration: none; display: flex; align-items: center; border-bottom: 1px solid #ddd; font-size: 14px;">
                    <svg viewBox="0 0 40 40" width="20" height="20" style="margin-right: 8px;">
                        <path d="M 5 12 L 5 16 L 11 16 M 5 28 L 5 24 L 11 24" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M 11 16 A 4 4 0 0 1 11 24" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M 16 5 L 16 11 L 20 11 M 28 5 L 28 11 L 24 11" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M 20 11 A 4 4 0 0 0 24 11" fill="none" stroke="currentColor" stroke-width="2"/>
                        <polyline points="15,20 22,20 22,15" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    </svg> 雙承口
                </a>
                <a href="#" class="sub-tool-btn" data-tool="elbow90_2" style="color: black; padding: 10px 12px; text-decoration: none; display: flex; align-items: center; border-bottom: 1px solid #ddd; font-size: 14px;">
                    <svg viewBox="0 0 40 40" width="20" height="20" style="margin-right: 8px;">
                        <path d="M 5 8 L 5 14 L 13 14 M 5 32 L 5 26 L 13 26" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M 13 14 A 6 6 0 0 1 13 26" fill="none" stroke="currentColor" stroke-width="2"/>
                        <polyline points="19,20 32,20 32,8" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        <line x1="26" y1="8" x2="38" y2="8" stroke="currentColor" stroke-width="2"/>
                    </svg> 法蘭
                </a>
                <a href="#" class="sub-tool-btn" data-tool="elbow90_1" style="color: black; padding: 10px 12px; text-decoration: none; display: flex; align-items: center; font-size: 14px;">
                    <svg viewBox="0 0 40 40" width="20" height="20" style="margin-right: 8px;">
                        <path d="M 5 8 L 5 14 L 13 14 M 5 32 L 5 26 L 13 26" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M 13 14 A 6 6 0 0 1 13 26" fill="none" stroke="currentColor" stroke-width="2"/>
                        <polyline points="19,20 32,20 32,5" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    </svg> 承口
                </a>
            </div>
        </div>

        <button class="tool-btn" data-tool="elbow45">45°彎頭</button>
        <button class="tool-btn" data-tool="quick_release">快拆</button>
        <button class="tool-btn" data-tool="text">文字</button>
        <button class="tool-btn" data-tool="arrow">箭頭</button>
        <button class="tool-btn" data-tool="l_arrow">L型箭頭</button>
        <span style="border-left: 1px solid #ccc; margin: 0 10px; height: 30px;"></span>
        <input type="color" id="colorPicker" value="#0056b3" title="選擇顏色" style="cursor: pointer; height: 36px; border: none;">
        <button onclick="applyColor()" style="background: #17a2b8;">套用顏色</button>
        <button class="danger" onclick="deleteSelected()">刪除選取元件</button>
        <button onclick="undo()" style="background: #ffc107; color: #333;">還原 (上一步)</button>
        <button onclick="generateDXF()" style="background: #6f42c1;">產生 DXF 下載</button>
    </div>

    <div id="canvas-container">
        <canvas id="editorCanvas" width="1000" height="600"></canvas>
    </div>
    <div class="status" id="statusText">請先上傳圖片，讓系統為您自動運算。</div>
</div>

<script src="/static/app.js?v=1.0.25"></script>
</body>
</html>
